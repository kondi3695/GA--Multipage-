<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Miette Bakery</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;0,900;1,400;1,700&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --cream:#fdf6ee; --warm:#fffcf7; --caramel:#c8873a; --caramel-d:#a06828;
  --choc:#3b1f0e; --mocha:#6b3f1f; --blush:#f0d5bc; --dusty:#e8b89a;
  --gold:#d4a84b; --text:#2a1508; --muted:#8a6a52; --green:#4a7c59;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--text);overflow-x:hidden;}
 
/* ── PAGE SYSTEM ── */
.page{display:none;min-height:100vh;padding-top:72px;}
.page.active{display:block;}
 
/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;
  justify-content:space-between;padding:0 60px;height:72px;
  background:rgba(253,246,238,0.96);backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(200,135,58,0.15);box-shadow:0 2px 20px rgba(59,31,14,0.06);}
.logo{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:900;font-style:italic;
  color:var(--choc);cursor:pointer;text-decoration:none;}
.logo span{color:var(--caramel);}
.nav-links{display:flex;gap:28px;list-style:none;align-items:center;}
.nav-links a{font-size:0.8rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--mocha);
  text-decoration:none;cursor:pointer;transition:color .2s;}
.nav-links a:hover{color:var(--caramel);}
.cart-btn{display:flex;align-items:center;gap:8px;background:var(--choc);color:var(--cream);
  padding:9px 20px;border-radius:3px;border:none;cursor:pointer;font-family:'Jost',sans-serif;
  font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;transition:background .2s;}
.cart-btn:hover{background:var(--caramel);}
.cart-badge{background:var(--caramel);color:#fff;border-radius:50%;width:18px;height:18px;
  font-size:0.65rem;font-weight:700;display:flex;align-items:center;justify-content:center;}
.ham{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;}
.ham span{width:22px;height:2px;background:var(--choc);display:block;}
 
/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 32px;border:none;
  border-radius:3px;cursor:pointer;font-family:'Jost',sans-serif;font-size:0.82rem;
  letter-spacing:0.1em;text-transform:uppercase;transition:all .25s;text-decoration:none;}
.btn-primary{background:var(--caramel);color:#fff;}
.btn-primary:hover{background:var(--caramel-d);transform:translateY(-2px);box-shadow:0 8px 24px rgba(200,135,58,.35);}
.btn-dark{background:var(--choc);color:#fff;}
.btn-dark:hover{background:var(--caramel);transform:translateY(-2px);}
.btn-outline{background:transparent;color:var(--choc);border:1.5px solid var(--choc);}
.btn-outline:hover{background:var(--choc);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:#3a6347;transform:translateY(-2px);}
.btn-sm{padding:9px 20px;font-size:0.75rem;}
.btn-full{width:100%;justify-content:center;}
 
/* ── TOAST ── */
.toast{position:fixed;bottom:28px;right:28px;background:var(--choc);color:#fff;
  padding:14px 22px;border-radius:4px;font-size:0.85rem;border-left:3px solid var(--caramel);
  box-shadow:0 10px 30px rgba(0,0,0,.2);z-index:9999;
  transform:translateY(80px);opacity:0;transition:all .3s;max-width:320px;}
.toast.show{transform:translateY(0);opacity:1;}
 
/* ════════════════════════════════════════
   HOME PAGE
════════════════════════════════════════ */
.hero{min-height:calc(100vh - 72px);display:grid;grid-template-columns:1fr 1fr;overflow:hidden;}
.hero-left{display:flex;flex-direction:column;justify-content:center;padding:80px 70px 60px 80px;}
.hero-tag{font-size:0.72rem;letter-spacing:.25em;text-transform:uppercase;color:var(--caramel);
  font-weight:500;margin-bottom:18px;display:flex;align-items:center;gap:10px;}
.hero-tag::before{content:'';width:36px;height:1px;background:var(--caramel);}
.hero-h1{font-family:'Playfair Display',serif;font-size:clamp(3rem,5.5vw,5rem);
  font-weight:900;line-height:1.0;color:var(--choc);margin-bottom:22px;}
.hero-h1 em{font-style:italic;color:var(--caramel);display:block;}
.hero-sub{font-size:1rem;color:var(--muted);line-height:1.7;max-width:400px;margin-bottom:40px;font-weight:300;}
.hero-btns{display:flex;gap:14px;flex-wrap:wrap;}
.hero-stats{display:flex;gap:36px;margin-top:56px;padding-top:36px;border-top:1px solid var(--blush);}
.stat-n{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--caramel);}
.stat-l{font-size:0.72rem;color:var(--muted);margin-top:2px;letter-spacing:.05em;}
.hero-right{background:var(--blush);position:relative;overflow:hidden;}
.hero-imgs{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:3px;}
.hero-imgs div{overflow:hidden;}
.hero-imgs img{width:100%;height:100%;object-fit:cover;transition:transform 6s;}
.hero-imgs div:hover img{transform:scale(1.06);}
.float-badge{position:absolute;bottom:40px;left:-24px;background:var(--choc);color:var(--cream);
  padding:16px 24px;border-radius:4px;font-family:'Playfair Display',serif;font-size:.9rem;font-style:italic;
  box-shadow:0 20px 50px rgba(59,31,14,.25);animation:fl 4s ease-in-out infinite;z-index:2;}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
 
/* marquee */
.mq{background:var(--choc);padding:16px 0;overflow:hidden;white-space:nowrap;}
.mq-track{display:inline-flex;animation:mq 22s linear infinite;}
.mq-item{font-family:'Playfair Display',serif;font-size:.95rem;font-style:italic;color:var(--blush);padding:0 28px;}
.mq-dot{color:var(--caramel);}
@keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
 
/* featured section */
.sec{padding:80px 80px;}
.sec-hd{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:44px;}
.sec-tag{font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;color:var(--caramel);
  font-weight:500;margin-bottom:12px;display:flex;align-items:center;gap:10px;}
.sec-tag::before{content:'';width:28px;height:1px;background:var(--caramel);}
.sec-title{font-family:'Playfair Display',serif;font-size:clamp(2rem,3.5vw,2.8rem);
  font-weight:900;color:var(--choc);line-height:1.1;}
.sec-title em{font-style:italic;color:var(--caramel);}
 
/* product cards */
.prod-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;}
.prod-card{background:var(--warm);border-radius:8px;overflow:hidden;
  box-shadow:0 2px 16px rgba(59,31,14,.06);transition:all .3s;cursor:pointer;position:relative;}
.prod-card:hover{transform:translateY(-6px);box-shadow:0 20px 48px rgba(59,31,14,.14);}
.prod-img{height:200px;overflow:hidden;position:relative;}
.prod-img img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.prod-card:hover .prod-img img{transform:scale(1.08);}
.prod-badge{position:absolute;top:12px;left:12px;background:var(--caramel);color:#fff;
  font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:2px;}
.prod-body{padding:18px;}
.prod-name{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;
  color:var(--choc);margin-bottom:6px;}
.prod-desc{font-size:.78rem;color:var(--muted);line-height:1.5;margin-bottom:14px;}
.prod-foot{display:flex;justify-content:space-between;align-items:center;}
.prod-price{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;color:var(--caramel);}
.prod-orig{font-size:.75rem;color:var(--muted);text-decoration:line-through;margin-left:4px;}
.add-btn{width:34px;height:34px;border-radius:50%;background:var(--choc);color:#fff;
  border:none;font-size:1.1rem;cursor:pointer;transition:all .2s;
  display:flex;align-items:center;justify-content:center;}
.add-btn:hover{background:var(--caramel);transform:scale(1.1);}
 
/* categories */
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;}
.cat-card{position:relative;height:180px;overflow:hidden;border-radius:8px;cursor:pointer;}
.cat-card img{width:100%;height:100%;object-fit:cover;transition:transform .5s;}
.cat-card:hover img{transform:scale(1.08);}
.cat-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(59,31,14,.75),transparent);
  display:flex;align-items:flex-end;padding:18px;}
.cat-name{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:#fff;font-style:italic;}
.cat-count{font-size:.72rem;color:var(--dusty);margin-top:2px;}
 
/* why us */
.why-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:24px;margin-top:50px;}
.why-card{padding:32px 24px;border-radius:8px;background:var(--warm);text-align:center;
  border-top:3px solid transparent;transition:all .3s;}
.why-card:hover{border-top-color:var(--caramel);transform:translateY(-4px);}
.why-icon{font-size:2rem;margin-bottom:16px;}
.why-title{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;color:var(--choc);margin-bottom:8px;}
.why-desc{font-size:.8rem;color:var(--muted);line-height:1.6;}
